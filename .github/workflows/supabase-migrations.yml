name: Supabase migrations

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/supabase-migrations.yml"
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Debug — secret lengths and project ref prefix
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo "PROJECT_REF length: ${#SUPABASE_PROJECT_REF}"
          echo "PROJECT_REF first 4 chars: ${SUPABASE_PROJECT_REF:0:4}…"
          echo "DB_PASSWORD length: ${#SUPABASE_DB_PASSWORD}"
          echo "DB_PASSWORD has trailing whitespace?: $([ "${SUPABASE_DB_PASSWORD: -1}" = " " ] && echo YES || echo no)"
          echo "ACCESS_TOKEN length: ${#SUPABASE_ACCESS_TOKEN}"
          echo "ACCESS_TOKEN starts with: ${SUPABASE_ACCESS_TOKEN:0:4}…"

      - name: Link project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Push migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db push --include-all --yes
